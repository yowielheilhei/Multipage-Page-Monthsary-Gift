<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - YUNKY</title>
    
    <!-- Link the reusable Navigation CSS -->
    <link rel="stylesheet" href="nav.css">
    
    <!-- Link the specific CSS for the gallery page -->
    <link rel="stylesheet" href="gallery.css">
</head>
<body>
    <!-- The navigation bar is injected here by nav.js -->

    <!-- Main Content Area -->
    <main class="gallery-container">
        
        <!-- CSS Grid for the photo layout -->
        <div class="gallery-grid">
            
            <!-- Top Left (Standard Square) -->
           <div class="grid-item">
                <img src="assets/images/gallery/1.jfif" alt="Pink Flowers">
            </div>

            <!-- Top Right (Tall, spans 2 rows) -->
            <div class="grid-item item-tall">
                <img src="assets/images/gallery/2.jfif" alt="Romantic moment">
            </div>

            <!-- Middle Left (Standard Square) -->
            <div class="grid-item">
                <img src="assets/images/gallery/3.jfif" alt="Heart lights">
            </div>

            <!-- Middle (Wide, spans 2 columns) -->
            <div class="grid-item item-wide">
                <img src="assets/images/gallery/4.jfif" alt="Couple holding hands at sunset">
            </div>

            <!-- Bottom Left (Standard Square) -->
            <div class="grid-item">
                <img src="assets/images/gallery/5.jfif" alt="Holding hands">
            </div>

            <!-- Bottom Right (Standard Square) -->
            <div class="grid-item">
                <img src="assets/images/gallery/6.jfif" alt="Pink aesthetic">
            </div>
            
            <div class="grid-item">
                <img src="assets/images/gallery/7.jfif" alt="Pink Flowers">
            </div>

            <!-- Top Right (Tall, spans 2 rows) -->
            <div class="grid-item item-tall">
                <img src="assets/images/gallery/8.PNG" alt="Romantic moment">
            </div>

            <!-- Middle Left (Standard Square) -->
            <div class="grid-item">
                <img src="assets/images/gallery/9.JPG" alt="Heart lights">
            </div>

            <!-- Middle (Wide, spans 2 columns) -->
            <div class="grid-item item-wide">
                <img src="assets/images/gallery/10.PNG" alt="Couple holding hands at sunset">
            </div>

            <!-- Bottom Left (Standard Square) -->
            <div class="grid-item">
                <img src="assets/images/gallery/11.JPG" alt="Holding hands">
            </div>

            <!-- Bottom Right (Standard Square) -->
            <div class="grid-item">
                <img src="assets/images/gallery/12.JPG" alt="Pink aesthetic">
            </div>

            <!-- Bottom Left (Standard Square) -->
            <div class="grid-item">
                <img src="assets/images/gallery/13.JPG" alt="Holding hands">
            </div>

            <!-- Bottom Right (Standard Square) -->
            <div class="grid-item">
                <img src="assets/images/gallery/14.JPG" alt="Pink aesthetic">
            </div>
            <!-- Bottom Left (Standard Square) -->
            <div class="grid-item">
                <img src="assets/images/gallery/15.JPG" alt="Holding hands">
            </div>

            <!-- Bottom Right (Standard Square) -->
            <div class="grid-item">
                <img src="assets/images/gallery/16.PNG" alt="Pink aesthetic">
            </div>

        </div> <div class="gallery-modal-overlay" id="gallery-modal">
            <span class="gallery-close-btn" id="gallery-close">&times;</span>
            <img class="gallery-modal-img" id="gallery-modal-img" src="" alt="Full Screen">
        </div>
        
    </main>

    <script src="nav.js"></script>
    <script src="gallery.js"></script>
</body>
</html>
