<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song For You - YUNKY</title>
    
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="song.css">
</head>
<body>
    <main class="song-container">
        <div class="featured-scroll" id="featured-scroll"></div>
        <div class="playlist-container" id="playlist-container"></div>
    </main>

    <div class="music-player">
        
        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
            <span id="total-time">0:00</span>
        </div>

        <div class="player-content">
            <div class="player-info">
                <img src="https://images.unsplash.com/photo-1518199268839-2f2231db0006?w=100" id="player-cover" alt="Cover">
                <div class="player-text">
                    <h4 id="player-title">Select a song</h4>
                    <p id="player-artist">Artist</p>
                </div>
            </div>
            
            <div class="player-controls">
                <button id="prev-btn" class="control-btn">&#9194;</button>
                <button id="play-btn" class="control-btn play-pause">&#9654;</button>
                <button id="next-btn" class="control-btn">&#9193;</button>
            </div>
            
            <div class="volume-container">
                <span style="color: #fb85a6; font-size: 1.1rem;">🔈</span>
                <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="1">
            </div>
        </div>
        
        <audio id="audio-element"></audio>
    </div>

    <script src="nav.js"></script>
    <script src="song.js"></script>
</body>
</html>
